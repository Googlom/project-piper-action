name: Release Piper Action

on:
  workflow_dispatch:
  schedule:
#    - cron: '0 9 * * 1'  # at 9 am every Monday
    - cron: '*/10 * * * *'  # every 10 minutes

jobs:
  check_latest_commit_date:
#    if: ${{ github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    name: Check latest commit
    outputs:
      should_run: ${{ steps.should_run.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4

      - id: should_run
        continue-on-error: true
        name: Check if latest commit is less than a week
#        run: if [[ -n $(git rev-list  --after="7 days" ${{ github.sha }}) ]]; then echo "should_run=false" >> GITHUB_ENV; fi
        run: |
          if [[ -n $(git rev-list --after="10 minutes" ${{ github.sha }}) ]] 
          then 
            echo "should_run=true" >> "$GITHUB_OUTPUT" 
          else 
            echo "No commits for the last week
          fi

      # in case of manual release trigger
      - if: ${{ github.event_name == 'workflow_dispatch' }}
        run: echo "should_run=true" >> "$GITHUB_OUTPUT"


  release:
    name: Release with new tag
    needs: check_latest_commit_date
    if: ${{ needs.check_latest_commit_date.outputs.should_run == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Increment version
        id: version
        uses: reecetech/version-increment@2024.4.1
        with:
          scheme: semver
          increment: minor

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
          make_latest: true
